<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MJ Product Reviews</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
margin:0;
padding:0;
text-align:center;
}

header{
background:#111;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
max-width:220px;
margin:auto;
display:block;
}

.title{
font-size:20px;
font-weight:bold;
margin-top:15px;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
background:#27ae60;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#219150;
}

footer{
margin-top:40px;
padding:20px;
background:#111;
color:white;
font-size:14px;
}

a{
text-decoration:none;
color:inherit;
}

</style>

</head>

<body>

<header>
MJ Product Reviews
</header>

<div class="grid">

<!-- MITOLYN -->
<div class="card">
<a href="mitolyn-review.html">
<img src="produto0.jpg">
<div class="title">Mitolyn</div>
<button>Read Review</button>
</a>
</div>

<!-- LIV PURE -->
<div class="card">
<a href="livpure-review.html">
<img src="produto1.jpg">
<div class="title">Liv Pure</div>
<button>Read Review</button>
</a>
</div>

<!-- IKARIA JUICE -->
<div class="card">
<a href="ikaria-review.html">
<img src="produto3.jpg">
<div class="title">Ikaria Juice</div>
<button>Read Review</button>
</a>
</div>

<!-- JAVA BURN -->
<div class="card">
<a href="javaburn-review.html">
<img src="produto4.jpg">
<div class="title">Java Burn</div>
<button>Read Review</button>
</a>
</div>

</div>

<footer>
© 2026 MJ Reviews - All Rights Reserved
</footer>

</body>
</html>
